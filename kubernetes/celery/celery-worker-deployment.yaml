apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.34.0 (HEAD)
  labels:
    io.kompose.service: celery-worker
  name: celery-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: celery-worker
  strategy:
    type: Recreate
  template:
    metadata:
      namespace: default
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.34.0 (HEAD)
      labels:
        io.kompose.service: celery-worker
    spec:
      containers:
        - args:
            - celery
            - -A
            - campaignerapi
            - worker
            - -l
            - DEBUG
          envFrom:
            - configMapRef:
                name: campaignerapp-configmap
          image: celery-worker
          name: celery-worker
          volumeMounts:
            - mountPath: /code
              name: celery-worker-cm0
          workingDir: /code
      volumes:
        - name: celery-worker-cm0
          configMap:
            name: celery-worker-cm0
      restartPolicy: Always
